services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dole-system-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
    environment:
      # These flags tell the richarvey image to skip composer/npm if we want
      - SKIP_COMPOSER=1
      - WEBROOT=/var/www/html
      - APP_ENV=development
      - APP_DEBUG=true
      - PHP_MEMORY_LIMIT=256M
      - PHP_FPM_MAX_CHILDREN=10
      - PHP_FPM_START_SERVERS=2
      - PHP_FPM_MIN_SPARE_SERVERS=1
      - PHP_FPM_MAX_SPARE_SERVERS=3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # No local db dependency — connects to Supabase via .env credentials

# MariaDB service removed — application now exclusively uses Supabase (PostgreSQL).
